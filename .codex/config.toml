[features]
codex_hooks = true

[mcp_servers.serena]
startup_timeout_sec = 15
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context=codex"]

[[hooks.SessionStart]]

[[hooks.SessionStart.hooks]]
type = "command"
command = "mise exec bun -- bun .codex/hooks/checkpoint-session-start.ts"
timeout = 10
statusMessage = "Checking active checkpoint"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "mise exec bun -- bun .codex/hooks/dirty-state-stop.ts"
timeout = 10
statusMessage = "Checking git dirty state"
